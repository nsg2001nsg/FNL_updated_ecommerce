{% extends "basic.html" %}
{% block title %}Verify OTP{% endblock %}
{% block head %}

    setTimeout("preventBack()", 0);
    window.onunload = function () { null };
</script>

{% block css %}
body{
     background-color:#ffe9ec;
    }
{% endblock %}
<!--   navbar ends here-->
{% block body %}

<div class="container my-3">
<div class="card" style="width: 30rem; margin:auto; border:0; padding:1.5rem;">
    <div style=" text-align:center;">
    <a class="navbar-brand" style="font-family: Anton"><h2 style="display: inline-block; color:black; position:relative;" >F</h2>
      <h5 style="display: inline-block; color:black; position:relative;" >&</h5>
        <h2 style="display: inline-block; color:black; position:relative;" >L</h2><h6 style="color:black">Fashion & Lifestyle</h6></a></div>
  <div class="card-body">
    <h5 class="card-title">Verify OTP</h5>
    <form action="{% url 'verify' %}" method="POST" id="myform">{% csrf_token %}
        <input  id="email" type="hidden" value="{{customer.email}}" name="email">
    <input id="otp" type="hidden" value="{{customer.otp}}" name="otp">
    <input id="pass" type="hidden" value="{{customer.password}}" name="pass">
    <div>
    <label for="otpx" style="position:relative; background-color:white; color:black; top:10px; left:10px;">OTP</label><br>
    <input id="otpx" name="otpx" type="number" maxlength="4" required><br>
    </div><br><br>
        <figure class="text-center">
            <button id="sub" type="button" style="background-color: #FF647F; color:white; border:0; width:50%; height:2rem;"><b>Continue</b> </button><br></figure>
        <div>
</div>
</form>
<p id="prompt"></p>
  </div>
</div>
</div>

{% endblock %}
{% block js %}
<script>
 let count = 0
    var otp = document.getElementById("otp").value;
    var email = document.getElementById("email").value;
    document.getElementById("sub").onclick = function(){
        document.getElementById("prompt").innerHTML = "";
        count += 1;
        if (count <= 3){
            var val = document.getElementById("otpx").value;
            if (val == otp){
                document.getElementById("myform").submit();
            }
            else{
                document.getElementById("myform").reset();
                document.getElementById("prompt").innerHTML = "Incorrect OTP";
                document.getElementById("prompt").style.color = "red";
            }
        }
        else{
            window.location.href = "{% url 'signup' %}";
        }
    }
</script>
{% endblock %}
